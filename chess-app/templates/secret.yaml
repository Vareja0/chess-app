apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Name }}
type: Opaque
stringData:
  postgres-db: {{ .Values.postgres.database | quote }}
  postgres-user: {{ .Values.postgres.username | quote }}
  postgres-password: {{ .Values.postgres.password | quote }}
  redis-password: {{ .Values.redis.auth.password | quote }}
  secret-key: {{ .Values.web.secretKey | quote }}
  refresh-secret-key: {{ .Values.web.refreshSecretKey | quote }}
